version: 2.1

jobs:
  build:
    docker:
      - image: python:3.12
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: pip install outerbounds ob-project-utils

      - run:
          name: Configure Outerbounds
          command: |
            outerbounds service-principal-configure \
              --from-obproject-toml \
              --toml-path obproject_multi.toml \
              --jwt-token $CIRCLE_OIDC_TOKEN_V2

      - run:
          name: Deploy Project
          command: obproject-deploy
          environment:
            PYTHONUNBUFFERED: "1"

      - store_artifacts:
          path: deployment_summary.md
          destination: deployment-summary
